<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report – Misaki Anti Pédophile</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000; color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; overflow-x: hidden; position: relative;
    }
    #stars-canvas { position: fixed; inset: 0; z-index: 0; }
    header {
      position: relative; z-index: 1; width: 100%;
      display: flex; align-items: center; justify-content: center;
      gap: 16px; padding: 32px 20px 16px;
    }
    .header-logo {
      width: 55px; height: 55px; border-radius: 50%; object-fit: cover;
      box-shadow: 0 0 20px rgba(114,137,218,0.6); animation: shake 0.35s infinite;
    }
    @keyframes shake {
      0%   { transform: translate(0,0) rotate(0deg); }
      15%  { transform: translate(-3px,2px) rotate(-1deg); }
      30%  { transform: translate(3px,-2px) rotate(1deg); }
      45%  { transform: translate(-2px,3px) rotate(-0.5deg); }
      60%  { transform: translate(2px,-3px) rotate(0.5deg); }
      75%  { transform: translate(-3px,-1px) rotate(-1deg); }
      90%  { transform: translate(3px,1px) rotate(1deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    .header-title {
      font-size: clamp(1.1rem,3.5vw,1.7rem); font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
      background: linear-gradient(135deg,#fff 30%,#7289da 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    main {
      position: relative; z-index: 1; width: 100%; max-width: 680px;
      padding: 10px 24px 60px; display: flex; flex-direction: column; gap: 20px;
    }
    .page-title {
      font-size: clamp(1.5rem,4vw,2.1rem); font-weight: 900; text-align: center;
      background: linear-gradient(135deg,#ff5f5f 0%,#ff8c8c 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-sub { text-align: center; font-size: 0.88rem; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; margin-top: -10px; }
    .form-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(114,137,218,0.2);
      border-radius: 16px; padding: 28px; backdrop-filter: blur(4px);
      display: flex; flex-direction: column; gap: 20px;
    }
    .field { display: flex; flex-direction: column; gap: 7px; }
    label { font-size: 0.85rem; font-weight: 700; color: #a0b4ff; letter-spacing: 0.5px; text-transform: uppercase; }
    label span { color: #ff6b6b; }
    input[type="text"], textarea, select {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(114,137,218,0.3);
      border-radius: 10px; color: #fff; font-family: inherit; font-size: 0.95rem;
      padding: 12px 14px; outline: none; transition: border-color 0.2s; width: 100%;
    }
    input[type="text"]:focus, textarea:focus, select:focus { border-color: #7289da; background: rgba(114,137,218,0.1); }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3); }
    textarea { resize: vertical; min-height: 110px; }
    select option { background: #1a1a2e; color: #fff; }
    .file-zone {
      border: 2px dashed rgba(114,137,218,0.35); border-radius: 12px; padding: 24px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative;
    }
    .file-zone:hover { border-color: #7289da; background: rgba(114,137,218,0.07); }
    .file-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .file-icon { font-size: 2rem; }
    .file-label { font-size: 0.9rem; color: rgba(255,255,255,0.55); text-align: center; }
    .file-label strong { color: #a0b4ff; }
    .file-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .file-preview-item {
      background: rgba(114,137,218,0.15); border: 1px solid rgba(114,137,218,0.3);
      border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; color: #c5d0ff;
      display: flex; align-items: center; gap: 6px;
    }
    .file-preview-item .remove { cursor: pointer; color: #ff6b6b; font-weight: bold; background: none; border: none; font-size: 1rem; line-height: 1; }
    .submit-btn {
      background: linear-gradient(135deg,#e74c3c,#c0392b); color: #fff;
      font-size: 1rem; font-weight: 800; padding: 15px 30px; border-radius: 12px;
      border: none; cursor: pointer; letter-spacing: 0.5px; width: 100%;
      transition: transform 0.18s, filter 0.18s; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px; align-self: center;
      background: linear-gradient(135deg,#5865f2,#7289da); color: #fff;
      font-size: 0.9rem; font-weight: 700; padding: 12px 26px; border-radius: 10px;
      text-decoration: none; letter-spacing: 0.5px; transition: transform 0.18s, filter 0.18s;
    }
    .back-btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #2ecc71; color: #fff; font-weight: 700;
      padding: 14px 28px; border-radius: 12px; font-size: 0.95rem;
      z-index: 999; transition: transform 0.4s; box-shadow: 0 4px 20px rgba(0,0,0,0.4); white-space: nowrap;
    }
    .toast.error { background: #e74c3c; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    footer {
      position: relative; z-index: 1; width: 100%;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 20px 20px 24px; display: flex; flex-direction: column;
      align-items: center; gap: 12px; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); margin-top: auto;
    }
    .footer-copyright { font-size: 0.78rem; color: rgba(255,255,255,0.4); text-align: center; }
    .btn-mathix {
      background: linear-gradient(135deg,#1a1a2e,#16213e); color: #a0b4ff;
      font-size: 0.85rem; font-weight: 600; padding: 10px 22px; border-radius: 8px;
      text-decoration: none; border: 1px solid rgba(114,137,218,0.35);
      transition: transform 0.18s, filter 0.18s; letter-spacing: 0.5px;
    }
    .btn-mathix:hover { transform: translateY(-2px); filter: brightness(1.2); }
  </style>
</head>
<body>

  <canvas id="stars-canvas"></canvas>
  <div class="toast" id="toast"></div>

  <header>
    <img src="logo.png" alt="Logo Misaki" class="header-logo" />
    <span class="header-title">Misaki Anti Pédophile</span>
  </header>

  <main>
    <h1 class="page-title">⛔ Signaler un suspect</h1>
    <p class="page-sub">Brigade Anti Pédo — Formulaire de report</p>

    <div class="form-card">
      <div class="field">
        <label>@ Discord du suspect <span>*</span></label>
        <input type="text" id="suspect-tag" placeholder="ex: utilisateur ou @utilisateur" />
      </div>
      <div class="field">
        <label>ID Discord du suspect <span>*</span></label>
        <input type="text" id="suspect-id" placeholder="ex: 123456789012345678" maxlength="20" />
      </div>
      <div class="field">
        <label>Votre @ Discord <span>*</span></label>
        <input type="text" id="reporter-tag" placeholder="ex: votre_pseudo" />
      </div>
      <div class="field">
        <label>Raison du report <span>*</span></label>
        <select id="reason-select">
          <option value="">— Sélectionner une raison —</option>
          <option value="Comportement suspect en vocal avec des mineurs">Comportement suspect en vocal avec des mineurs</option>
          <option value="Envoi de contenu inapproprié à des mineurs">Envoi de contenu inapproprié à des mineurs</option>
          <option value="Tentative de contact avec des mineurs">Tentative de contact avec des mineurs</option>
          <option value="Demande d'informations personnelles à des mineurs">Demande d'informations personnelles à des mineurs</option>
          <option value="Autre (préciser ci-dessous)">Autre (préciser ci-dessous)</option>
        </select>
      </div>
      <div class="field">
        <label>Détails supplémentaires</label>
        <textarea id="details" placeholder="Décrivez ce que vous avez observé (heure, salon vocal, comportement précis...)"></textarea>
      </div>
      <div class="field">
        <label>Preuves (screenshots, enregistrements) <span>*</span></label>
        <div class="file-zone" id="file-zone">
          <input type="file" id="file-input" accept="image/*,video/*,audio/*" multiple />
          <div class="file-icon">📎</div>
          <div class="file-label"><strong>Cliquez</strong> ou glissez vos fichiers ici<br><span style="font-size:0.75rem;color:rgba(255,255,255,0.3)">Images, vidéos, enregistrements acceptés</span></div>
        </div>
        <div class="file-preview" id="file-preview"></div>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitReport()">⛔ Envoyer le report</button>
    </div>

    <a href="index.html" class="back-btn">← Retour à l'accueil</a>
  </main>

  <footer>
    <p class="footer-copyright">© 2026 MathiX Games Corporation - Tous droits réservés</p>
    <a href="https://mathix224.github.io/MathiX-Games-Corporation/index.html" target="_blank" rel="noopener" class="btn-mathix">MathiX Games Corporation</a>
  </footer>

  <script>
    // ══ CONFIG ══
    const BIN_ID  = '6a2db720f5f4af5e29ed1947';
    const API_KEY = '$2a$10$rBDXJZuPm6IsqFBzHoRR2upk.oj0n0AKpp0c3yHSDSAHwrNkUdh2W'; // Colle ta X-Master-Key ici

    /* ── Stars ── */
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function initStars() {
      stars = [];
      for (let i = 0; i < 220; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.8+0.3, speed: Math.random()*6+0.5, alpha: Math.random()*0.6+0.4 });
    }
    function drawStars() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for (const s of stars) {
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random()*canvas.width; }
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${s.alpha})`; ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize',()=>{resize();initStars();});
    resize(); initStars(); drawStars();

    /* ── File handling ── */
    let selectedFiles = [];
    const fileInput = document.getElementById('file-input');
    const filePreview = document.getElementById('file-preview');
    const fileZone = document.getElementById('file-zone');

    fileInput.addEventListener('change', () => {
      for (const f of fileInput.files) {
        if (!selectedFiles.find(x => x.name===f.name && x.size===f.size)) selectedFiles.push(f);
      }
      renderPreviews(); fileInput.value = '';
    });
    fileZone.addEventListener('dragover', e => { e.preventDefault(); fileZone.style.borderColor='#7289da'; });
    fileZone.addEventListener('dragleave', () => { fileZone.style.borderColor=''; });
    fileZone.addEventListener('drop', e => {
      e.preventDefault(); fileZone.style.borderColor='';
      for (const f of e.dataTransfer.files) {
        if (!selectedFiles.find(x => x.name===f.name && x.size===f.size)) selectedFiles.push(f);
      }
      renderPreviews();
    });
    function renderPreviews() {
      filePreview.innerHTML = '';
      selectedFiles.forEach((f,i) => {
        const div = document.createElement('div');
        div.className = 'file-preview-item';
        div.innerHTML = `<span>${f.name.length>28?f.name.slice(0,25)+'...':f.name}</span><button class="remove" onclick="removeFile(${i})">✕</button>`;
        filePreview.appendChild(div);
      });
    }
    function removeFile(i) { selectedFiles.splice(i,1); renderPreviews(); }

    /* ── Toast ── */
    function showToast(msg, isError=false) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className='toast'+(isError?' error':'')+' show';
      setTimeout(()=>{ t.className='toast'+(isError?' error':''); }, 3500);
    }

    /* ── Submit → JSONBin ── */
    async function submitReport() {
      const tag      = document.getElementById('suspect-tag').value.trim();
      const id       = document.getElementById('suspect-id').value.trim();
      const reporter = document.getElementById('reporter-tag').value.trim();
      const reason   = document.getElementById('reason-select').value;
      const details  = document.getElementById('details').value.trim();

      if (!tag || !id || !reporter || !reason) { showToast('⚠️ Remplis tous les champs obligatoires !', true); return; }
      if (selectedFiles.length === 0) { showToast('⚠️ Ajoute au moins une preuve !', true); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = '⏳ Envoi en cours...';

      try {
        // Convert files to base64
        const filePromises = selectedFiles.map(f => new Promise((res) => {
          const reader = new FileReader();
          reader.onload = () => res({ name: f.name, type: f.type, data: reader.result });
          reader.readAsDataURL(f);
        }));
        const filesData = await Promise.all(filePromises);

        // Get current reports from JSONBin
        const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { 'X-Master-Key': API_KEY }
        });
        const getData = await getRes.json();
        let reports = getData.record;
        if (!Array.isArray(reports)) reports = [];
        // Remove init placeholder if present
        reports = reports.filter(r => !r.init);

        // Add new report
        reports.push({
          id: Date.now().toString(),
          date: new Date().toLocaleString('fr-FR'),
          suspectTag: tag,
          suspectId: id,
          reporter: reporter,
          reason: reason,
          details: details,
          proofs: filesData.map(f => f.name),
          proofsData: filesData,
          status: 'new'
        });

        // Save back to JSONBin
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
          body: JSON.stringify(reports)
        });

        showToast('✅ Report envoyé avec succès !');
        document.getElementById('suspect-tag').value = '';
        document.getElementById('suspect-id').value = '';
        document.getElementById('reporter-tag').value = '';
        document.getElementById('reason-select').value = '';
        document.getElementById('details').value = '';
        selectedFiles = []; renderPreviews();

      } catch (err) {
        showToast('❌ Erreur lors de l\'envoi. Réessaie.', true);
        console.error(err);
      }

      btn.disabled = false; btn.innerHTML = '⛔ Envoyer le report';
    }
  </script>

</body>
</html>
