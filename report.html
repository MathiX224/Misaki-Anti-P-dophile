<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report – Misaki Anti Pédophile</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000; color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; overflow-x: hidden; position: relative;
    }
    #stars-canvas { position: fixed; inset: 0; z-index: 0; }

    header {
      position: relative; z-index: 1; width: 100%;
      display: flex; align-items: center; justify-content: center;
      gap: 14px; padding: 30px 20px 14px;
    }
    .header-logo {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      box-shadow: 0 0 18px rgba(114,137,218,0.6); animation: shake 0.35s infinite;
    }
    @keyframes shake {
      0%   { transform: translate(0,0) rotate(0deg); }
      15%  { transform: translate(-3px,2px) rotate(-1deg); }
      30%  { transform: translate(3px,-2px) rotate(1deg); }
      45%  { transform: translate(-2px,3px) rotate(-0.5deg); }
      60%  { transform: translate(2px,-3px) rotate(0.5deg); }
      75%  { transform: translate(-3px,-1px) rotate(-1deg); }
      90%  { transform: translate(3px,1px) rotate(1deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    .header-title {
      font-size: clamp(1rem,3vw,1.6rem); font-weight: 900;
      text-transform: uppercase; letter-spacing: 1px;
      background: linear-gradient(135deg,#fff 30%,#7289da 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    main {
      position: relative; z-index: 1; width: 100%; max-width: 660px;
      padding: 8px 20px 60px; display: flex; flex-direction: column; gap: 18px;
    }

    .page-title {
      font-size: clamp(1.4rem,4vw,2rem); font-weight: 900; text-align: center;
      background: linear-gradient(135deg,#ff5f5f,#ff9090);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-sub {
      text-align: center; font-size: 0.82rem; color: rgba(255,255,255,0.4);
      letter-spacing: 2px; text-transform: uppercase; margin-top: -8px;
    }

    .form-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(114,137,218,0.18);
      border-radius: 16px; padding: 26px 24px;
      backdrop-filter: blur(6px);
      display: flex; flex-direction: column; gap: 18px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 0.78rem; font-weight: 700; color: #a0b4ff;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    label .req { color: #ff6b6b; margin-left: 2px; }

    input[type="text"], textarea, select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(114,137,218,0.28);
      border-radius: 10px; color: #fff;
      font-family: inherit; font-size: 0.93rem;
      padding: 11px 13px; outline: none;
      transition: border-color 0.2s, background 0.2s; width: 100%;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: #7289da; background: rgba(114,137,218,0.09);
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.28); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
    select option { background: #1a1a2e; color: #fff; }

    /* File drop zone */
    .file-zone {
      border: 2px dashed rgba(114,137,218,0.32);
      border-radius: 12px; padding: 22px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative;
    }
    .file-zone.dragover { border-color: #7289da; background: rgba(114,137,218,0.08); }
    .file-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .file-zone-icon { font-size: 1.8rem; }
    .file-zone-text { font-size: 0.88rem; color: rgba(255,255,255,0.5); text-align: center; }
    .file-zone-text strong { color: #a0b4ff; }
    .file-zone-hint { font-size: 0.72rem; color: rgba(255,255,255,0.28); }

    .file-preview { display: flex; flex-wrap: wrap; gap: 8px; }
    .preview-thumb {
      position: relative; width: 80px; height: 80px;
      border-radius: 8px; overflow: hidden;
      border: 1px solid rgba(114,137,218,0.3);
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .preview-thumb .file-tag {
      width: 80px; height: 80px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      background: rgba(114,137,218,0.15); font-size: 0.65rem; color: #c5d0ff;
      text-align: center; padding: 4px;
    }
    .preview-thumb .remove-btn {
      position: absolute; top: 3px; right: 3px;
      background: rgba(0,0,0,0.7); color: #ff6b6b;
      border: none; border-radius: 50%; width: 18px; height: 18px;
      font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .submit-btn {
      background: linear-gradient(135deg,#e74c3c,#c0392b);
      color: #fff; font-size: 1rem; font-weight: 800;
      padding: 14px 28px; border-radius: 12px; border: none;
      cursor: pointer; letter-spacing: 0.5px; width: 100%;
      transition: transform 0.18s, filter 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.12); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 8px; align-self: center;
      background: linear-gradient(135deg,#5865f2,#7289da);
      color: #fff; font-size: 0.88rem; font-weight: 700;
      padding: 11px 24px; border-radius: 10px; text-decoration: none;
      transition: transform 0.18s, filter 0.18s;
    }
    .back-btn:hover { transform: translateY(-2px); filter: brightness(1.12); }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2ecc71; color: #fff; font-weight: 700;
      padding: 12px 26px; border-radius: 12px; font-size: 0.92rem;
      z-index: 999; transition: transform 0.4s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); white-space: nowrap;
    }
    .toast.error { background: #e74c3c; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    footer {
      position: relative; z-index: 1; width: 100%;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 18px 20px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); margin-top: auto;
    }
    .footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.35); text-align: center; }
    .btn-mathix {
      background: linear-gradient(135deg,#1a1a2e,#16213e); color: #a0b4ff;
      font-size: 0.82rem; font-weight: 600; padding: 9px 20px; border-radius: 8px;
      text-decoration: none; border: 1px solid rgba(114,137,218,0.3);
      transition: transform 0.18s, filter 0.18s;
    }
    .btn-mathix:hover { transform: translateY(-2px); filter: brightness(1.18); }
  </style>
</head>
<body>

  <canvas id="stars-canvas"></canvas>
  <div class="toast" id="toast"></div>

  <header>
    <img src="logo.png" alt="Logo" class="header-logo" />
    <span class="header-title">Misaki Anti Pédophile</span>
  </header>

  <main>
    <h1 class="page-title">⛔ Signaler un suspect</h1>
    <p class="page-sub">Brigade Anti Pédo — Formulaire de report</p>

    <div class="form-card">

      <div class="field">
        <label>@ Discord du suspect <span class="req">*</span></label>
        <input type="text" id="suspect-tag" placeholder="ex : @utilisateur" />
      </div>

      <div class="field">
        <label>ID Discord du suspect <span class="req">*</span></label>
        <input type="text" id="suspect-id" placeholder="ex : 123456789012345678" maxlength="20" />
      </div>

      <div class="field">
        <label>Votre @ Discord <span class="req">*</span></label>
        <input type="text" id="reporter-tag" placeholder="ex : votre_pseudo" />
      </div>

      <div class="field">
        <label>Raison du report <span class="req">*</span></label>
        <select id="reason-select">
          <option value="">— Sélectionner une raison —</option>
          <option>Comportement suspect en vocal avec des mineurs</option>
          <option>Envoi de contenu inapproprié à des mineurs</option>
          <option>Tentative de contact avec des mineurs</option>
          <option>Demande d'informations personnelles à des mineurs</option>
          <option>Autre (préciser dans les détails)</option>
        </select>
      </div>

      <div class="field">
        <label>Détails supplémentaires</label>
        <textarea id="details" placeholder="Décrivez précisément ce que vous avez observé : heure, salon vocal, comportement, mots utilisés..."></textarea>
      </div>

      <div class="field">
        <label>Preuves — screenshots / enregistrements <span class="req">*</span></label>
        <div class="file-zone" id="file-zone">
          <input type="file" id="file-input" accept="image/*,video/*,audio/*" multiple />
          <div class="file-zone-icon">📎</div>
          <div class="file-zone-text"><strong>Cliquer</strong> ou glisser les fichiers ici</div>
          <div class="file-zone-hint">Images, vidéos et enregistrements acceptés</div>
        </div>
        <div class="file-preview" id="file-preview"></div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitReport()">
        ⛔ Envoyer le report
      </button>

    </div>

    <a href="index.html" class="back-btn">← Retour à l'accueil</a>
  </main>

  <footer>
    <p class="footer-copy">© 2026 MathiX Games Corporation - Tous droits réservés</p>
    <a href="https://mathix224.github.io/MathiX-Games-Corporation/index.html" target="_blank" rel="noopener" class="btn-mathix">MathiX Games Corporation</a>
  </footer>

  <script>
    // ════════════════════════════════
    //  CONFIG — remplace la clé API
    // ════════════════════════════════
    const BIN_ID  = '6a2db720f5f4af5e29ed1947';
    const API_KEY = 'REMPLACE_PAR_TA_CLE_API'; // ← colle ta X-Master-Key ici

    // ── Stars ──
    const canvas = document.getElementById('stars-canvas');
    const ctx    = canvas.getContext('2d');
    let stars    = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function initStars() {
      stars = [];
      for (let i = 0; i < 220; i++)
        stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                     r: Math.random()*1.8+0.3, speed: Math.random()*6+0.5, alpha: Math.random()*0.6+0.4 });
    }
    function drawStars() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for (const s of stars) {
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random()*canvas.width; }
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`; ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', () => { resize(); initStars(); });
    resize(); initStars(); drawStars();

    // ── Files ──
    let selectedFiles = [];
    const fileInput   = document.getElementById('file-input');
    const filePreview = document.getElementById('file-preview');
    const fileZone    = document.getElementById('file-zone');

    fileInput.addEventListener('change', () => {
      addFiles(fileInput.files); fileInput.value = '';
    });
    fileZone.addEventListener('dragover',  e => { e.preventDefault(); fileZone.classList.add('dragover'); });
    fileZone.addEventListener('dragleave', () => fileZone.classList.remove('dragover'));
    fileZone.addEventListener('drop', e => {
      e.preventDefault(); fileZone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });

    function addFiles(list) {
      for (const f of list)
        if (!selectedFiles.find(x => x.name===f.name && x.size===f.size)) selectedFiles.push(f);
      renderPreviews();
    }

    function renderPreviews() {
      filePreview.innerHTML = '';
      selectedFiles.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'preview-thumb';
        if (f.type.startsWith('image/')) {
          const url = URL.createObjectURL(f);
          div.innerHTML = `<img src="${url}" alt="${f.name}" /><button class="remove-btn" onclick="removeFile(${i})">✕</button>`;
        } else {
          div.innerHTML = `<div class="file-tag"><span style="font-size:1.4rem">${f.type.startsWith('video/')? '🎥':'🎙️'}</span><span>${f.name.slice(0,12)}</span></div><button class="remove-btn" onclick="removeFile(${i})">✕</button>`;
        }
        filePreview.appendChild(div);
      });
    }
    function removeFile(i) { selectedFiles.splice(i,1); renderPreviews(); }

    // ── Toast ──
    function showToast(msg, isError=false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '') + ' show';
      setTimeout(() => { t.className = 'toast' + (isError ? ' error' : ''); }, 3500);
    }

    // ── Submit ──
    async function submitReport() {
      const tag      = document.getElementById('suspect-tag').value.trim();
      const sid      = document.getElementById('suspect-id').value.trim();
      const reporter = document.getElementById('reporter-tag').value.trim();
      const reason   = document.getElementById('reason-select').value;
      const details  = document.getElementById('details').value.trim();

      if (!tag || !sid || !reporter || !reason) {
        showToast('⚠️ Remplis tous les champs obligatoires !', true); return;
      }
      if (selectedFiles.length === 0) {
        showToast('⚠️ Ajoute au moins une preuve !', true); return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = '⏳ Envoi en cours...';

      try {
        // Convert files to base64
        const filesData = await Promise.all(selectedFiles.map(f => new Promise(res => {
          const r = new FileReader();
          r.onload = () => res({ name: f.name, type: f.type, size: f.size, data: r.result });
          r.readAsDataURL(f);
        })));

        // Fetch current bin
        const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { 'X-Master-Key': API_KEY }
        });
        const getData = await getRes.json();
        let reports = Array.isArray(getData.record) ? getData.record : [];
        reports = reports.filter(r => !r.init);

        reports.push({
          id:         Date.now().toString(),
          date:       new Date().toLocaleString('fr-FR'),
          suspectTag: tag,
          suspectId:  sid,
          reporter,
          reason,
          details,
          filesData,
          status: 'new'
        });

        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method:  'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
          body:    JSON.stringify(reports)
        });

        showToast('✅ Report envoyé avec succès !');
        ['suspect-tag','suspect-id','reporter-tag','details'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('reason-select').value = '';
        selectedFiles = []; renderPreviews();

      } catch(err) {
        console.error(err);
        showToast('❌ Erreur lors de l\'envoi. Vérifie la clé API.', true);
      }

      btn.disabled = false; btn.innerHTML = '⛔ Envoyer le report';
    }
  </script>
</body>
</html>
